# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Set up Julia
      uses: julia-actions/setup-julia@v1
      with:
        version: '1.10'
    - name: Install Julia packages
      run: |
        # Install required Julia packages for NUFFT calculator
        julia -e 'using Pkg; Pkg.add("FFTW"); Pkg.add("DiffResults"); Pkg.add("ForwardDiff")'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        sudo apt-get update
        
        # Install the fortran compiler with lapack and blas
        sudo apt-get install gfortran libblas-dev liblapack-dev
        
        pip install numpy
        pip install ase
        pip install julia

        # Clone and install cellconstructor
        pip install meson meson-python ninja
        pip install --no-build-isolation cellconstructor

        # Configure PyJulia to use the installed Julia
        python -c 'import julia; julia.install()'
      env:
        PYTHON: python
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Install the package
      run: |
        pip install --user .
    - name: Test with pytest
      run: |
        pytest
